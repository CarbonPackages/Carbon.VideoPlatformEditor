
privilegeTargets:
  'Neos\Flow\Security\Authorization\Privilege\Method\MethodPrivilege':

    'Carbon.VideoPlatformEditor:Endpoints':
      matcher: 'method(Carbon\VideoPlatformEditor\Controller\.*Controller->.*Action())'

roles:

    'Neos.Neos:AbstractEditor':
      privileges:
        -
          privilegeTarget: 'Carbon.VideoPlatformEditor:Endpoints'
          permission: GRANT
